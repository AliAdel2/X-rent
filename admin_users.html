<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الصلاحيات والعمولات | Masar PRO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #3498db; --gold: #f1c40f; --dark-bg: #0a0f18; --card-bg: #161e2d; --input-bg: #1e293b; --purple: #9b59b6; --red: #e74c3c; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: #e2e8f0; padding-top: 30px; }
        
        .main-card { background: var(--card-bg); border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .section-title { font-weight: 900; color: var(--gold); border-right: 4px solid var(--gold); padding-right: 15px; margin-bottom: 20px; font-size: 1.1rem; }
        
        .lux-input { width: 100%; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; color: white; font-weight: 600; }
        .lux-input:focus { border-color: var(--gold); outline: none; background: #243049; }
        
        .btn-action { background: var(--gold); color: black; font-weight: 900; border: none; border-radius: 12px; padding: 12px 25px; transition: 0.3s; }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3); }
        
        /* 📊 تنسيق الجدول الاحترافي المحسن */
        .user-table { background: var(--input-bg); border-radius: 18px; overflow: hidden; border-collapse: separate; border-spacing: 0; }
        .user-table th { background: rgba(255,255,255,0.04); color: var(--gold); font-weight: 700; border: none; padding: 18px 15px; font-size: 0.95rem; letter-spacing: 0.5px; }
        .user-table td { color: #e2e8f0; border-bottom: 1px solid rgba(255,255,255,0.03); padding: 16px 15px; vertical-align: middle; font-size: 0.92rem; }
        .user-table tbody tr { transition: background-color 0.2s ease; }
        .user-table tbody tr:hover { background-color: rgba(255, 255, 255, 0.02); }
        .user-table tbody tr:last-child td { border-bottom: none; }
        
        .badge-role { font-size: 0.82rem; font-weight: 700; padding: 6px 12px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-black text-white m-0"><i class="fas fa-user-shield text-primary me-2"></i> لوحة إدارة الحسابات والعمولات</h4>
        <a href="admin_home.html" class="btn btn-sm btn-outline-light rounded-3 fw-bold"><i class="fas fa-home me-1"></i> الرئيسية</a>
    </div>

    <div class="row g-4">
        <!-- كارت إضافة وتعديل المستخدمين المزدوج -->
        <div class="col-lg-4">
            <div class="main-card p-4">
                <div class="section-title" id="formTitle"><i class="fas fa-user-plus"></i> تأسيس مستخدم جديد</div>
                <form id="createUserForm">
                    <!-- حقل مخفي لتخزين الـ ID وقت التعديل -->
                    <input type="hidden" id="currentEditingId" value="">

                    <div class="mb-3">
                        <label class="small text-muted mb-2 fw-bold">اسم الموظف / المسوق</label>
                        <input type="text" id="newUserName" class="lux-input" required placeholder="مثال: أحمد محمد">
                    </div>
                    <div class="mb-3">
                        <label class="small text-muted mb-2 fw-bold">البريد الإلكتروني (Login Email)</label>
                        <input type="email" id="newUserEmail" class="lux-input" required placeholder="name@masar.com">
                    </div>
                    <div class="mb-3">
                        <label class="small text-muted mb-2 fw-bold">كلمة المرور</label>
                        <input type="password" id="newUserPass" class="lux-input" required placeholder="******">
                    </div>
                    <div class="mb-3">
                        <label class="small text-muted mb-2 fw-bold">نوع الحساب والصلاحية</label>
                        <select id="newUserRole" class="lux-input" onchange="toggleCommissionFields()">
                            <option value="marketer">مسوق خارجي / عمولات</option>
                            <option value="supervisor">مشرف / حركة الدخول والخروج</option>
                            <option value="admin">إدارة / مشرف عام</option>
                        </select>
                    </div>

                    <div id="commissionBox">
                        <div class="mb-3">
                            <label class="small text-muted mb-2 fw-bold">نوع احتساب العمولة</label>
                            <select id="commType" class="lux-input">
                                <option value="fixed">مبلغ ثابت عن كل ليلة (ج.م)</option>
                                <option value="percent">نسبة مئوية من إجمالي الحجز (%)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="small text-muted mb-2 fw-bold">قيمة أو نسبة العمولة</label>
                            <input type="number" id="commValue" class="lux-input" placeholder="مثال: 150 أو 10" value="100">
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" id="submitUserBtn" class="btn-action flex-grow-1">اعتماد وإنشاء الحساب</button>
                        <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary rounded-3 fw-bold px-3" style="display: none;" onclick="resetFormState()">إلغاء</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- جدول الحسابات بتنسيقه الجديد المتناسق -->
        <div class="col-lg-8">
            <div class="main-card p-4 h-100">
                <div class="section-title"><i class="fas fa-users"></i> هيكل المستخدمين النشطين حالياً</div>
                <div class="table-responsive">
                    <table class="table user-table text-center align-middle m-0">
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>الإيميل</th>
                                <th>الصلاحية</th>
                                <th>نظام العمولة</th>
                                <th>التحكم الإجرائي</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="5" class="text-muted py-4">جاري تحميل قائمة المستخدمين المعتمدين...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
        authDomain: "masar-8dbce.firebaseapp.com",
        projectId: "masar-8dbce",
        storageBucket: "masar-8dbce.firebasestorage.app",
        messagingSenderId: "201867140566",
        appId: "1:201867140566:web:b21dd8f049276007ed1877"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // كاش محلي مؤقت لحفظ بيانات اليوزرات ليسهل سحبها فورا للحقول عند الضغط على تعديل دون استهلاك كويريز إضافية
    let cachedUsers = {};

    window.toggleCommissionFields = () => {
        const role = document.getElementById('newUserRole').value;
        if (role === 'admin' || role === 'supervisor') {
            document.getElementById('commissionBox').style.display = 'none';
        } else {
            document.getElementById('commissionBox').style.display = 'block';
        }
    };

    // الاستماع الحي وتحديث الجدول
    onSnapshot(collection(db, "users"), (snapshot) => {
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = "";
        cachedUsers = {}; 
        
        snapshot.forEach((docSnap) => {
            const user = docSnap.data();
            const id = docSnap.id;
            cachedUsers[id] = user; // تخزين في الكاش
            
            let commText = "---";
            if(user.role === 'marketer') {
                commText = user.commType === 'fixed' ? `${user.commValue} ج.م / ليلة` : `${user.commValue}% من الحجز`;
            }

            let roleBadge = "";
            if (user.role === 'admin') {
                roleBadge = `<span class="badge bg-danger badge-role">إدارة</span>`;
            } else if (user.role === 'supervisor') {
                roleBadge = `<span class="badge badge-role" style="background-color: var(--purple)">مشرف حركة</span>`;
            } else {
                roleBadge = `<span class="badge bg-primary badge-role">مسوق</span>`;
            }

            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold text-white">${user.name}</td>
                    <td class="text-white-50">${user.email}</td>
                    <td>${roleBadge}</td>
                    <td class="text-warning fw-bold">${commText}</td>
                    <td>
                        <div class="d-inline-flex gap-2">
                            <button class="btn btn-sm btn-outline-warning rounded-3 px-3" onclick="prepareUserToEdit('${id}')">
                                <i class="fas fa-user-pen me-1"></i> تعديل
                            </button>
                            <button class="btn btn-sm btn-outline-danger rounded-3 px-3" onclick="deleteUserAccount('${id}', '${user.name}')">
                                <i class="fas fa-user-xmark me-1"></i> حذف
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
    });

    // 🔄 دالة جلب البيانات فوق مباشرة في الحقول وتحويل وضعية الفورم
    window.prepareUserToEdit = (id) => {
        const user = cachedUsers[id];
        if(!user) return;

        // ضخ البيانات داخل الحقول
        document.getElementById('currentEditingId').value = id;
        document.getElementById('newUserName').value = user.name;
        document.getElementById('newUserEmail').value = user.email;
        document.getElementById('newUserPass').value = user.pass || "";
        document.getElementById('newUserRole').value = user.role;
        
        if(user.role === 'marketer') {
            document.getElementById('commType').value = user.commType || 'fixed';
            document.getElementById('commValue').value = user.commValue || 0;
        }

        // تحديث الرؤية البصرية للفورم والزراير
        window.toggleCommissionFields();
        document.getElementById('formTitle').innerHTML = `<i class="fas fa-user-pen text-warning"></i> تعديل بيانات الحساب الجاري`;
        document.getElementById('submitUserBtn').innerText = "تعديل وحفظ البيانات";
        document.getElementById('submitUserBtn').className = "btn btn-warning text-black fw-black w-100 rounded-3 p-2";
        document.getElementById('cancelEditBtn').style.display = "block";
        
        // عمل Scroll خفيف للفورم عشان يركز مع الحقول علطول
        document.getElementById('createUserForm').scrollIntoView({ behavior: 'smooth' });
    };

    // دالة تصفير واستعادة وضع الفورم الطبيعي لحالة الإضافة
    window.resetFormState = () => {
        document.getElementById('currentEditingId').value = "";
        document.getElementById('createUserForm').reset();
        window.toggleCommissionFields();
        
        document.getElementById('formTitle').innerHTML = `<i class="fas fa-user-plus"></i> تأسيس مستخدم جديد`;
        document.getElementById('submitUserBtn').innerText = "اعتماد وإنشاء الحساب";
        document.getElementById('submitUserBtn').className = "btn-action w-100 mt-2";
        document.getElementById('cancelEditBtn').style.display = "none";
    };

    // معالجة إرسال الفورم المزدوج (إضافة / تعديل)
    document.getElementById('createUserForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitUserBtn');
        const editId = document.getElementById('currentEditingId').value;
        
        btn.disabled = true; 
        btn.innerText = editId ? "جاري التعديل والمزامنة..." : "جاري الحفظ التكتيكي...";

        const role = document.getElementById('newUserRole').value;

        const userObject = {
            name: document.getElementById('newUserName').value,
            email: document.getElementById('newUserEmail').value,
            pass: document.getElementById('newUserPass').value,
            role: role,
            commType: role === 'marketer' ? document.getElementById('commType').value : 'none',
            commValue: role === 'marketer' ? parseFloat(document.getElementById('commValue').value) : 0,
            updatedAt: new Date()
        };

        try {
            if (editId) {
                // عمل تحديث لليوزر الحالي مع الاحتفاظ بتاريخ التأسيس القديم لو أردت
                await setDoc(doc(db, "users", editId), userObject, { merge: true });
                alert("✅ تم تعديل بيانات المستخدم بنجاح ومزامنتها ميدانياً.");
            } else {
                // إضافة حساب جديد تماماً
                userObject.createdAt = new Date();
                await addDoc(collection(db, "users"), userObject);
                alert("✅ تم إنشاء وتفعيل الحساب بنجاح في السيستم.");
            }
            resetFormState();
        } catch (err) { alert("❌ خطأ أثناء معالجة العملية: " + err.message); }
        
        btn.disabled = false;
    };

    // حذف مستخدم
    window.deleteUserAccount = async (id, name) => {
        if(confirm(`⚠️ هل أنت متأكد من حذف حساب (${name}) نهائياً وسحب صلاحياته الميدانية؟`)) {
            // إذا كان المستخدم محمل حالياً للتعديل وتم حذفه، صفر الفورم أولاً
            if(document.getElementById('currentEditingId').value === id) { resetFormState(); }
            await deleteDoc(doc(db, "users", id));
            alert("🗑️ تم حذف الحساب بنجاح.");
        }
    };
</script>
</body>
</html>
