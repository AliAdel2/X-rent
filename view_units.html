<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشاليهات المتاحة | Masar PRO</title>
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-light: #f4f7fc;
            --card-white: #ffffff;
            --glass-border: rgba(0, 74, 173, 0.06);
            --text-main: #1e293b;
            --text-muted: #64748b;
            
            /* ألوان الهوية الفاتحة */
            --primary: #004aad;
            --primary-light: #edf4fe;
            --success: #2ecc71;
            --success-light: #e8fbf0;
            --danger: #e74c3c;
            --danger-light: #fdf2f2;
            --warning: #f39c12;
            --gold: #c5a059;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-light);
            color: var(--text-main); 
            padding-bottom: 60px;
            min-height: 100vh;
        }

        /* بار العناوين والرجوع */
        .page-header {
            background: var(--card-white);
            border: 1px solid var(--glass-border);
            padding: 14px 18px; 
            border-radius: 16px;
            margin-top: 15px; 
            box-shadow: 0 8px 20px rgba(0, 74, 173, 0.02);
        }

        .btn-back {
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            background: #ffffff;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.25s ease;
        }
        .btn-back:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* شريط البحث والفلاتر */
        .filter-section {
            background: var(--card-white);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px;
            margin-top: 12px;
            box-shadow: 0 6px 15px rgba(0, 74, 173, 0.01);
        }

        .search-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .filter-btn {
            border: 1px solid transparent;
            background: #f8fafc;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.25s;
        }
        .filter-btn.active {
            background: var(--primary-light);
            color: var(--primary);
            border-color: rgba(0, 74, 173, 0.12);
        }

        /* كروت الشاليهات الملمومة والمضغوطة */
        .unit-card {
            background: var(--card-white);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px; /* تم تصغير البادينج للم الشاشة */
            box-shadow: 0 6px 16px rgba(0, 74, 173, 0.02);
            transition: all 0.25s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }
        .unit-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 74, 173, 0.06);
        }

        /* بادجات علوية ملمومة */
        .card-top-badges {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .unit-badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
        }
        .badge-available { background: var(--success-light); color: var(--success); }
        .badge-busy { background: var(--danger-light); color: var(--danger); }

        .badge-class-tag {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 800;
        }
        .tag-vip { background: linear-gradient(135deg, #f1c40f, #d35400); color: #fff; }
        .tag-medium { background: #3498db; color: #fff; }
        .tag-standard { background: #95a5a6; color: #fff; }

        .unit-number {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
            margin: 2px 0;
        }

        .price-tag {
            font-size: 1.15rem;
            font-weight: 800;
            color: #2c3e50;
        }

        .btn-action-booking {
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 9px;
            width: 100%;
            transition: all 0.25s;
            box-shadow: 0 3px 8px rgba(0, 74, 173, 0.1);
            margin-top: 6px;
        }
        .btn-action-booking:hover {
            background: #003685;
        }
        .btn-action-booking:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- رأس الصفحة -->
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <h6 class="fw-black m-0" style="color: var(--primary); font-size: 1.05rem;"><i class="fas fa-hotel me-1"></i> فحص الشاليهات والوحدات</h6>
            <p class="text-muted small mb-0" style="font-size: 0.75rem;">تابع الشاليهات المتاحة فوراً وأسعار الليلة</p>
        </div>
        <a href="marketer_dashboard.html" class="btn btn-back btn-sm px-2 py-1" style="font-size: 0.8rem;">
            <i class="fas fa-arrow-right me-1"></i> الرئيسية
        </a>
    </div>

    <!-- فلاتر البحث والتصفية السريعة -->
    <div class="filter-section">
        <div class="row g-2 align-items-center">
            <div class="col-12 col-md-4">
                <div class="search-box">
                    <i class="fas fa-search text-muted me-2" style="font-size: 0.85rem;"></i>
                    <input type="text" id="searchInput" placeholder="ابحث بكود، اسم الشاليه أو القرية..." oninput="filterUnits()">
                </div>
            </div>
            <div class="col-12 col-md-8">
                <div class="d-flex gap-1 flex-wrap justify-content-md-end">
                    <button class="filter-btn active" id="btn-all" onclick="setFilter('all')">الكل (<span id="count-all">0</span>)</button>
                    <button class="filter-btn" id="btn-available" onclick="setFilter('available')">متاح (<span id="count-available">0</span>)</button>
                    <button class="filter-btn" id="btn-busy" onclick="setFilter('busy')">مشغول (<span id="count-busy">0</span>)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- شبكة عرض الكروت الديناميكية -->
    <div class="row g-2 mt-1" id="unitsGridContainer">
        <div class="col-12 text-center py-5 text-muted">
            <i class="fas fa-spinner fa-spin fa-2x mb-2 text-primary"></i>
            <p class="fw-bold small">جاري رصد حالة الشاليهات...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
        authDomain: "masar-8dbce.firebaseapp.com",
        projectId: "masar-8dbce",
        storageBucket: "masar-8dbce.firebasestorage.app",
        messagingSenderId: "201867140566",
        appId: "1:201867140566:web:b21dd8f049276007ed1877"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const localUserData = localStorage.getItem('loggedUser');
    let currentUserEmail = null;
    let currentUserRole = null;

    if (localUserData) {
        const parsedUser = JSON.parse(localUserData);
        currentUserEmail = parsedUser.email;
        currentUserRole = parsedUser.role;
    }

    if (!currentUserEmail || (currentUserRole !== 'مسوق' && currentUserRole !== 'ادارة')) {
        alert("⚠️ حماية النظام: وصول غير مصرح به! يرجى تسجيل الدخول أولاً.");
        window.location.href = "login.html";
    } else {
        listenToResortUnits();
    }

    let allUnitsArray = [];
    let currentFilterStatus = 'all';

    function listenToResortUnits() {
        onSnapshot(collection(db, "units"), (snapshot) => {
            allUnitsArray = [];
            snapshot.forEach((docSnap) => {
                allUnitsArray.push({ id: docSnap.id, ...docSnap.data() });
            });
            allUnitsArray.sort((a, b) => (a.rentCode || '').localeCompare(b.rentCode || ''));
            updateTabsCounters();
            renderUnitsGrid();
        });
    }

    function renderUnitsGrid() {
        const container = document.getElementById('unitsGridContainer');
        container.innerHTML = "";

        const searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();

        const filteredUnits = allUnitsArray.filter(u => {
            const uName = (u.chaletName || '').toLowerCase();
            const uCode = (u.rentCode || '').toLowerCase();
            const uVillage = (u.village || '').toLowerCase();
            
            const matchesSearch = uCode.includes(searchQuery) || uName.includes(searchQuery) || uVillage.includes(searchQuery);
            const isUnitAvailable = u.status === undefined || u.status === "متاح" || u.status === "متاح فوراً" || u.status === "جاهز";

            if (currentFilterStatus === 'available') {
                return matchesSearch && isUnitAvailable;
            } else if (currentFilterStatus === 'busy') {
                return matchesSearch && !isUnitAvailable;
            }
            return matchesSearch;
        });

        if (filteredUnits.length === 0) {
            container.innerHTML = `
                <div class="col-12 text-center py-4 text-muted">
                    <i class="fas fa-search-minus fa-xl mb-2 text-secondary"></i>
                    <p class="fw-bold small">لم نجد شاليهات تطابق البحث.</p>
                </div>`;
            return;
        }

        filteredUnits.forEach(u => {
            const isAvailable = u.status === undefined || u.status === "متاح" || u.status === "متاح فوراً" || u.status === "جاهز";
            const price = parseFloat(u.price || 0);
            const chaletName = u.chaletName || `كود (${u.rentCode || 'N/A'})`;

            let viewsText = 'إطلالة رائعة';
            if (u.view) {
                viewsText = Array.isArray(u.view) ? u.view.join(' و ') : u.view;
            }

            let classBadgeHTML = '';
            if (u.chaletClass === 'VIP') {
                classBadgeHTML = `<span class="badge-class-tag tag-vip"><i class="fas fa-crown"></i> ملكي</span>`;
            } else if (u.chaletClass === 'Medium') {
                classBadgeHTML = `<span class="badge-class-tag tag-medium">وسط</span>`;
            } else if (u.chaletClass === 'Standard') {
                classBadgeHTML = `<span class="badge-class-tag tag-standard">اقتصادي</span>`;
            }

            const div = document.createElement('div');
            div.className = "col-12 col-md-6 col-lg-4";
            div.innerHTML = `
                <div class="unit-card">
                    <!-- سطر البادجات العلوي الملموم -->
                    <div class="card-top-badges">
                        <span class="unit-badge ${isAvailable ? 'badge-available' : 'badge-busy'}">
                            <i class="fas ${isAvailable ? 'fa-circle-check' : 'fa-circle-xmark'} me-1"></i>
                            ${isAvailable ? 'متاح' : 'مشغول'}
                        </span>
                        ${classBadgeHTML}
                    </div>
                    
                    <!-- القرية والكود في مساحة مضغوطة -->
                    <div class="text-center">
                        <p class="text-muted fw-bold mb-0" style="color: var(--gold) !important; font-size: 0.75rem;"><i class="fas fa-campground"></i> ${u.village || 'قرية ريزورت'}</p>
                        <h3 class="unit-number">${chaletName}</h3>
                    </div>

                    <!-- السعر مدمج بخط ناعم -->
                    <div class="my-2 border-top border-bottom py-1 d-flex justify-content-between align-items-center">
                        <span class="text-muted fw-bold" style="font-size: 0.75rem;">سعر الليلة:</span>
                        <span class="price-tag">${price.toLocaleString()} <span style="font-size: 0.7rem; font-weight: normal; color: var(--text-muted);">ج.م</span></span>
                    </div>

                    <!-- تفاصيل الغرف مدمجة في سطر واحد خفيف -->
                    <p class="text-muted text-center mb-2" style="font-size: 0.75rem; font-weight: 600; line-height: 1.4;">
                        <i class="fas fa-bed text-secondary"></i> ${u.rooms || 0} غرف | 
                        <i class="fas fa-snowflake text-secondary"></i> ${u.acCount || 0} تكييف | 
                        <span class="text-primary fw-bold">${viewsText}</span>
                    </p>

                    <!-- زر الإجراء المضغوط -->
                    <button class="btn-action-booking" ${!isAvailable ? 'disabled' : ''} onclick="goToBookingPage('${u.rentCode || ''}', '${u.village || ''}', '${u.price || 0}')">
                        ${isAvailable ? '<i class="fas fa-calendar-plus me-1"></i> حجز الوحدة' : 'غير متاح'}
                    </button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function updateTabsCounters() {
        const allCount = allUnitsArray.length;
        const availableCount = allUnitsArray.filter(u => u.status === undefined || u.status === "متاح" || u.status === "متاح فوراً" || u.status === "جاهز").length;
        const busyCount = allCount - availableCount;

        document.getElementById('count-all').innerText = allCount;
        document.getElementById('count-available').innerText = availableCount;
        document.getElementById('count-busy').innerText = busyCount;
    }

    window.setFilter = (status) => {
        currentFilterStatus = status;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${status}`).classList.add('active');
        renderUnitsGrid();
    };

    window.filterUnits = () => {
        renderUnitsGrid();
    };

    window.goToBookingPage = (code, village, price) => {
        window.location.href = `make_booking.html?code=${encodeURIComponent(code)}&village=${encodeURIComponent(village)}&price=${encodeURIComponent(price)}`;
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
