<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة فريق العمل والصلاحيات | Masar PRO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #004aad; 
            --gold: #c5a059; 
            --bg-light: #f4f6f9;
            --card-bg: #ffffff;
            --text-dark: #2d3436;
        }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-light); color: var(--text-dark); padding: 20px 0; }
        .lux-card { background: var(--card-bg); border-radius: 25px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.04); padding: 25px; }
        .lux-input { background: #ffffff; border: 1px solid #e1e2e6; border-radius: 15px; padding: 12px 20px; color: var(--text-dark); font-weight: 700; }
        .lux-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 74, 173, 0.1); outline: none; }
        .btn-submit { background: linear-gradient(135deg, var(--primary), #002254); color: white; border: none; border-radius: 15px; font-weight: 800; padding: 12px; transition: all 0.3s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,74,173,0.2); color: white; }
        .staff-table { border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .staff-table th { background: var(--primary); color: white; text-align: center; font-size: 0.85rem; }
        .staff-table td { text-align: center; vertical-align: middle; font-size: 0.85rem; font-weight: 700; }
        .badge-admin { background-color: #deebff; color: #0052cc; }
        .badge-supervisor { background-color: #e3fcef; color: #006644; }
        .badge-marketer { background-color: #fff0b3; color: #172b4d; }
    </style>
</head>
<body>

<div class="container">
    <!-- الهيدر -->
    <div class="d-flex justify-content-between align-items-center mb-4 px-1">
        <div>
            <h4 class="fw-black text-dark m-0"><i class="fas fa-users-cog text-primary me-1"></i> إدارة الحسابات وصلاحيات الموظفين</h4>
            <p class="text-muted small m-0 mt-1">إضافة وتعيين صلاحيات المشرفين الميدانيين، المسوقين، وموظفي الإدارة العليا</p>
        </div>
        <a href="admin_dashboard.html" class="btn btn-sm btn-outline-secondary fw-bold rounded-pill px-3"><i class="fas fa-arrow-right me-1"></i> لوحة الإدارة</a>
    </div>

    <div class="row g-4">
        <!-- فورمة إضافة موظف جديد -->
        <div class="col-lg-5">
            <div class="lux-card">
                <h5 class="fw-bold text-primary mb-4"><i class="fas fa-user-plus me-1"></i> إنشاء حساب مستخدم جديد</h5>
                <form id="addStaffForm">
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">الاسم الكامل للموظف:</label>
                        <input type="text" id="staffName" class="form-control lux-input" placeholder="مثال: محمد جمال" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">رقم الهاتف المتصل بالواتساب:</label>
                        <input type="tel" id="staffPhone" class="form-control lux-input" placeholder="مثال: 010XXXXXXXX" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">الدور الوظيفي (الصلاحية):</label>
                        <select id="staffRole" class="form-select lux-input" required>
                            <option value="">-- اختر مستوى الصلاحية --</option>
                            <option value="ادارة">إدارة عليا / مالك السيستم (Full Admin)</option>
                            <option value="مشرف">مشرف ميداني (إدارة الشاليهات والتسكين والنثريات)</option>
                            <option value="مسوق">مسوق خارجي (إدخال وإدارة الحجوزات الخاصة به فقط)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">البريد الإلكتروني (اسم المستخدم للدخول):</label>
                        <input type="email" id="staffEmail" class="form-control lux-input" placeholder="username@masar.com" required dir="ltr">
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">كلمة المرور (Password):</label>
                        <div class="input-group">
                            <input type="text" id="staffPassword" class="form-control lux-input" placeholder="أدخل كلمة مرور قوية" required dir="ltr">
                            <button class="btn btn-outline-secondary" type="button" id="genPassBtn" style="border-radius: 0 15px 15px 0;"><i class="fas fa-magic"></i> توليد</button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-submit w-100" id="btnSubmit">
                        <i class="fas fa-user-check me-1"></i> اعتماد الحساب وتفعيل الصلاحية
                    </button>
                </form>
            </div>
        </div>

        <!-- جدول استعراض فريق العمل الحالي -->
        <div class="col-lg-7">
            <div class="lux-card">
                <h5 class="fw-bold text-dark mb-4"><i class="fas fa-shield-alt text-gold me-1"></i> الحسابات وفريق العمل المسجل حالياً</h5>
                <div class="table-responsive">
                    <table class="table table-hover staff-table border">
                        <thead>
                            <tr>
                                <th>الموظف</th>
                                <th>الصلاحية</th>
                                <th>بيانات الدخول</th>
                                <th>الهاتف</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="staffTableBody">
                            <tr>
                                <td colspan="5" class="py-4 text-muted">جاري تحميل مستخدمي النظام...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
        authDomain: "masar-8dbce.firebaseapp.com",
        projectId: "masar-8dbce",
        storageBucket: "masar-8dbce.firebasestorage.app",
        messagingSenderId: "201867140566",
        appId: "1:201867140566:web:b21dd8f049276007ed1877"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. زر لتوليد باسوورد عشوائي سريع تسهيلاً للعمل
    document.getElementById('genPassBtn').addEventListener('click', () => {
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$";
        let pass = "";
        for (let i = 0; i < 8; i++) {
            pass += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById('staffPassword').value = pass;
    });

    // 2. تحميل وعرض الموظفين الحاليين من الفايرستور
    async function loadStaffTeam() {
        const tbody = document.getElementById('staffTableBody');
        try {
            const snap = await getDocs(collection(db, "system_users"));
            let rowsHTML = "";
            let hasData = false;

            snap.forEach(documentDoc => {
                hasData = true;
                const user = documentDoc.data();
                const userId = documentDoc.id;

                let roleBadge = "";
                if(user.role === "ادارة") roleBadge = '<span class="badge badge-admin p-2 rounded-pill">إدارة عليا</span>';
                else if(user.role === "مشرف") roleBadge = '<span class="badge badge-supervisor p-2 rounded-pill">مشرف ميداني</span>';
                else roleBadge = '<span class="badge badge-marketer p-2 rounded-pill">مسوق</span>';

                rowsHTML += `
                    <tr>
                        <td class="text-start">
                            <div class="fw-bold text-dark">${user.name}</div>
                            <small class="text-muted" style="font-size:0.75rem">تم الإنشاء: ${user.createdAt ? user.createdAt.split('T')[0] : 'N/A'}</small>
                        </td>
                        <td>${roleBadge}</td>
                        <td class="text-start" dir="ltr" style="font-size:0.8rem">
                            <div><strong>U:</strong> ${user.email}</div>
                            <div class="text-muted"><strong>P:</strong> ${user.password}</div>
                        </td>
                        <td dir="ltr" style="font-size:0.8rem">${user.phone}</td>
                        <td>
                            <button class="btn btn-sm btn-link text-danger p-0 btn-delete-user" data-id="${userId}" data-name="${user.name}">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>`;
            });

            if (!hasData) {
                tbody.innerHTML = `<tr><td colspan="5" class="py-4 text-muted">لا يوجد موظفين مسجلين حالياً، ابدأ بإضافة أول حساب.</td></tr>`;
            } else {
                tbody.innerHTML = rowsHTML;
                attachDeleteEvents();
            }
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-danger py-4">خطأ أثناء تحميل فريق العمل: ${error.message}</td></tr>`;
        }
    }

    // 3. حفظ مستخدم جديد ومنع تكرار الإيميل
    document.getElementById('addStaffForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const emailInput = document.getElementById('staffEmail').value.trim().toLowerCase();

        const payload = {
            name: document.getElementById('staffName').value.trim(),
            phone: document.getElementById('staffPhone').value.trim(),
            role: document.getElementById('staffRole').value,
            email: emailInput,
            password: document.getElementById('staffPassword').value.trim(),
            createdAt: new Date().toISOString()
        };

        try {
            btn.disabled = true;
            btn.innerText = "جاري فحص وتوثيق الحساب...";

            // فحص سريع لو الإيميل متكرر في الفايرستور
            const snap = await getDocs(collection(db, "system_users"));
            let isEmailExists = false;
            snap.forEach(doc => {
                if(doc.data().email === emailInput) isEmailExists = true;
            });

            if(isEmailExists) {
                alert("❌ هذا البريد الإلكتروني مسجل لموظف آخر بالفعل! يرجى اختيار بريد مختلف.");
                btn.disabled = false;
                btn.innerText = "اعتماد الحساب وتفعيل الصلاحية";
                return;
            }

            // الحفظ في كوليكشن system_users
            await addDoc(collection(db, "system_users"), payload);
            
            alert(`🎉 تم إنشاء حساب (${payload.name}) بنجاح بصلاحية [${payload.role}]`);
            document.getElementById('addStaffForm').reset();
            loadStaffTeam();
        } catch (error) {
            alert("فشل إنشاء الحساب: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "اعتماد الحساب وتفعيل الصلاحية";
        }
    });

    // 4. حذف موظف
    function attachDeleteEvents() {
        document.querySelectorAll('.btn-delete-user').forEach(button => {
            button.addEventListener('click', async function() {
                const id = this.getAttribute('data-id');
                const name = this.getAttribute('data-name');
                if (confirm(`هل أنت متأكد تماماً من حذف حساب الموظف (${name}) وإلغاء صلاحية دخوله للنظام؟`)) {
                    try {
                        await deleteDoc(doc(db, "system_users", id));
                        alert("تم حذف الحساب بنجاح.");
                        loadStaffTeam();
                    } catch (error) {
                        alert("حدث خطأ أثناء الحذف: " + error.message);
                    }
                }
            });
        });
    }

    window.onload = () => {
        loadStaffTeam();
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
