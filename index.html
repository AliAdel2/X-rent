<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | X-rent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
     <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --bg-light: #f4f7fc;
            --card-white: #ffffff;
            --glass-border: rgba(0, 74, 173, 0.08);
            --text-main: #1e293b;
            --text-muted: #64748b;
            
            /* ألوان الهوية الفاتحة المستقرة */
            --primary: #004aad; 
            --primary-glow: rgba(0, 74, 173, 0.15);
            --gold: #f39c12; 
            --gold-glow: rgba(243, 156, 18, 0.15);
            
            /* تنسيق الحقول الفاتحة */
            --input-bg: #f8fafc;
            --input-border: #e2e8f0;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #eef2f7 0%, var(--bg-light) 100%); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        
        .login-container {
            background: var(--card-white);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 15px 35px rgba(0, 74, 173, 0.05), 0 5px 15px rgba(0, 0, 0, 0.02);
            text-align: center;
        }

        .brand-logo {
            width: 76px;
            height: 76px;
            background: linear-gradient(135deg, var(--primary), #00337c);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: white;
            margin-bottom: 22px;
            box-shadow: 0 10px 25px rgba(0, 74, 173, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* تنسيق وضبط الـ Input Groups في الـ RTL الفاتح */
        .lux-input-group {
            position: relative;
            display: flex;
            align-items: stretch;
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            transition: all 0.3s ease;
        }
        
        .lux-input-group:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: #ffffff;
        }

        .lux-input-group .input-group-text {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding-right: 18px;
            padding-left: 10px;
            display: flex;
            align-items: center;
        }

        .lux-input-group .form-control {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-weight: 600;
            padding: 14px 10px;
            font-size: 0.95rem;
            box-shadow: none !important;
        }
        
        .lux-input-group .form-control::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* زر إظهار الباسورد التفاعلي */
        .toggle-password {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding-left: 18px;
            padding-right: 10px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: var(--primary);
        }
        
        .btn-login { 
            background: linear-gradient(135deg, var(--primary), #003685); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 1rem;
            padding: 14px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 4px 12px rgba(0, 74, 173, 0.2);
        }
        .btn-login:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(0, 74, 173, 0.3); 
            color: white;
            background: linear-gradient(135deg, #0056c7, var(--primary)); 
        }
        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 0.75rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand-logo">
        <i class="fas fa-layer-group"></i>
    </div>
    
    <h3 class="fw-black text-dark m-0" style="letter-spacing: -0.5px; color: var(--primary) !important;">منظومة X-rent</h3>
    <p class="text-muted small mt-2 mb-4">بوابة تسجيل الدخول الموحدة للموظفين وفريق العمل</p>
   
    <form id="loginForm">
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold text-secondary ps-2 mb-2">البريد الإلكتروني للعمل:</label>
            <div class="lux-input-group">
                <span class="input-group-text"><i class="far fa-envelope"></i></span>
                <input type="email" id="loginEmail" class="form-control" placeholder="username@masar.com" required dir="ltr">
            </div>
        </div>

        <div class="mb-4 text-start">
            <label class="form-label small fw-bold text-secondary ps-2 mb-2">كلمة المرور (Password):</label>
            <div class="lux-input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required dir="ltr">
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                    <i id="passwordIcon" class="far fa-eye"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-login w-100" id="btnLogin">
            <i class="fas fa-sign-in-alt me-1"></i> تسجيل الدخول
        </button>
    </form>

    <div class="mt-4 pt-2">
        <p class="footer-text m-0">© 2026 جميع الحقوق محفوظة لشركة العافرى لإدارة المنتجعات السياحية</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
        authDomain: "masar-8dbce.firebaseapp.com",
        projectId: "masar-8dbce",
        storageBucket: "masar-8dbce.firebasestorage.app",
        messagingSenderId: "201867140566",
        appId: "1:201867140566:web:b21dd8f049276007ed1877"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ⚡ فحص ذكي: لو مسجل دخول مسبقاً في localStorage، يوجهه تلقائياً للـ Dashboard الخاصة به فوراً
    const localUserData = localStorage.getItem('loggedUser');
    if (localUserData) {
        const parsedUser = JSON.parse(localUserData);
        if (parsedUser.role === "ادارة") {
            window.location.href = "admin_dashboard.html";
        } else if (parsedUser.role === "مشرف") {
            window.location.href = "supervisor_dashboard.html";
        } else if (parsedUser.role === "مسوق") {
            window.location.href = "marketer_dashboard.html";
        }
    }

    // دالة إظهار وإخفاء كلمة المرور
    window.togglePasswordVisibility = () => {
        const passwordInput = document.getElementById('loginPassword');
        const passwordIcon = document.getElementById('passwordIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            passwordIcon.classList.remove('fa-eye');
            passwordIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            passwordIcon.classList.remove('fa-eye-slash');
            passwordIcon.classList.add('fa-eye');
        }
    };

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        const emailInput = document.getElementById('loginEmail').value.trim().toLowerCase();
        const passwordInput = document.getElementById('loginPassword').value.trim();

        try {
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin me-1"></i> جاري التحقق من الهوية...`;

            const snap = await getDocs(collection(db, "system_users"));
            let matchedUser = null;

            snap.forEach(doc => {
                const u = doc.data();
                if (u.email.toLowerCase() === emailInput && u.password === passwordInput) {
                    matchedUser = { id: doc.id, ...u };
                }
            });

            if (matchedUser) {
                // 🔄 التعديل الأساسي: الحفظ الدائم في localStorage بدلاً من sessionStorage
                localStorage.setItem('loggedUser', JSON.stringify({
                    id: matchedUser.id,
                    name: matchedUser.name,
                    role: matchedUser.role,
                    email: matchedUser.email
                }));

                if (matchedUser.role === "ادارة") {
                    alert(`مرحباً بك مجدداً يا هندسة! تم التوثيق كـ [إدارة عليا]`);
                    window.location.href = "admin_dashboard.html";
                } else if (matchedUser.role === "مشرف") {
                    alert(`تم التوثيق بنجاح.. مرحباً بك كابتن ${matchedUser.name} في لوحة التحكم الميدانية.`);
                    window.location.href = "supervisor_dashboard.html";
                } else if (matchedUser.role === "مسوق") {
                    alert(`تم التوثيق بنجاح.. بالتوفيق في حجوزاتك اليوم يا ${matchedUser.name}`);
                    window.location.href = "marketer_dashboard.html";
                } else {
                    alert("عذراً، لم يتم تحديد مستوى الصلاحية الخاص بحسابك. تواصل مع الدعم الفنى.");
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-sign-in-alt me-1"></i> تسجيل الدخول`;
                }
            } else {
                alert("❌ خطأ: البريد الإلكتروني أو كلمة المرور غير صحيحة، يرجى المحاولة مرة أخرى.");
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-sign-in-alt me-1"></i> تسجيل الدخول`;
            }

        } catch (error) {
            alert("حدث خطأ أثناء الاتصال بالسيرفر: " + error.message);
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-sign-in-alt me-1"></i> تسجيل الدخول`;
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
