<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الأصول وتحديث الأسعار | Masar Admin</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #3498db; --gold: #f1c40f; --dark-bg: #0a0f18; --card-bg: #161e2d; --input-bg: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: #e2e8f0; padding-bottom: 60px; }

        /* كروت عرض الشاليهات بنظام شبكي احترافي */
        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .unit-admin-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s, border-color 0.3s;
        }
        .unit-admin-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .unit-card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .unit-badge-class {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(10, 15, 24, 0.75);
            backdrop-filter: blur(8px);
            color: var(--gold);
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }

        .lux-modal {
            background: var(--card-bg);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
        }
        .lux-modal-input {
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: white;
            font-weight: 700;
            padding: 12px;
        }
        .lux-modal-input:focus {
            background: #243049;
            border-color: var(--gold);
            outline: none;
            color: white;
        }
    </style>
</head>
<body>

<!-- البار العلوي الذكي للتحكم -->
<nav class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center sticky-top" style="background: var(--dark-bg); border-color: rgba(255,255,255,0.05) !important;">
    <h5 class="m-0 fw-bold text-white"><i class="fas fa-boxes-stacked text-primary me-1"></i> أصول مسار الميدانية</h5>
    <div class="d-flex gap-2">
        <a href="manage_units.html" class="btn btn-sm btn-warning rounded-3 fw-black text-dark px-3"><i class="fas fa-plus me-1"></i> تكويد شاليه جديد</a>
        <a href="admin.html" class="btn btn-sm btn-outline-light rounded-3 fw-bold"><i class="fas fa-chart-line me-1"></i> لوحة التحكم</a>
    </div>
</nav>

<div class="container mt-4 px-3">
    <!-- شريط بحث سريع بين الأصول المسجلة -->
    <div class="p-3 rounded-4 mb-4" style="background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);">
        <div class="input-group">
            <span class="input-group-text bg-transparent border-0 text-muted"><i class="fas fa-search"></i></span>
            <input type="text" id="assetSearchInput" class="form-control bg-transparent border-0 text-white" placeholder="ابحث بكود الحجز (Rent Code)، اسم الشاليه، أو اسم المالك..." style="box-shadow: none;">
        </div>
    </div>

    <!-- شبكة عرض الوحدات الحية -->
    <div id="adminUnitsContainer" class="units-grid">
        <div class="text-center py-5 text-muted col-12">جاري جلب أصول القرية العقارية وتنسيق العرض...</div>
    </div>
</div>

<!-- 💰 مودال تغيير الأسعار السريع (Quick Price Updater Modal) -->
<div class="modal fade" id="priceUpdateModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content lux-modal">
            <div class="modal-header border-0 pb-0">
                <h6 class="modal-title fw-black"><i class="fas fa-coins text-warning me-1"></i> تحديث سعر الليلة الحركي</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small">شاليه: <b class="text-white" id="modalChaletTitle">---</b> (كود: <span id="modalChaletCode" class="text-primary">---</span>)</p>
                
                <input type="hidden" id="modalTargetUnitId">
                <div class="mb-3">
                    <label class="small text-muted mb-2 fw-bold">السعر الجديد لليلة الواحدة (ج.م):</label>
                    <input type="number" id="modalNewPriceInput" class="form-control lux-modal-input" placeholder="مثال: 2500">
                </div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-sm btn-outline-secondary rounded-3" data-bs-dismiss="modal">إلغاء</button>
                <button type="button" class="btn btn-sm btn-warning rounded-3 fw-bold text-dark px-3" onclick="saveNewPrice()">تحديث وتعميم السعر</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
        authDomain: "masar-8dbce.firebaseapp.com",
        projectId: "masar-8dbce",
        storageBucket: "masar-8dbce.firebasestorage.app",
        messagingSenderId: "201867140566",
        appId: "1:201867140566:web:b21dd8f049276007ed1877"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let cachedUnits = []; // حفظ نسخة محلية للفلترة الفورية فائقة السرعة
    let bootstrapPriceModal;

    // تشغيل وإعداد المودال الخاص بالأسعار
    document.addEventListener("DOMContentLoaded", () => {
        bootstrapPriceModal = new bootstrap.Modal(document.getElementById('priceUpdateModal'));
    });

    // استماع مباشر لجدول الشاليهات (Firestore Realtime)
    function listenToUnits() {
        onSnapshot(collection(db, "units"), (snapshot) => {
            cachedUnits = [];
            snapshot.forEach((docSnap) => {
                cachedUnits.push({ id: docSnap.id, ...docSnap.data() });
            });
            applyFilter();
        });
    }

    // فلترة حية بدون الحاجة لعمل ريفريش للشاشة
    function applyFilter() {
        const query = document.getElementById('assetSearchInput').value.toLowerCase().trim();
        const filtered = cachedUnits.filter(u => {
            return (u.rentCode && u.rentCode.toLowerCase().includes(query)) ||
                   (u.chaletName && u.chaletName.toLowerCase().includes(query)) ||
                   (u.ownerName && u.ownerName.toLowerCase().includes(query)) ||
                   (u.village && u.village.toLowerCase().includes(query));
        });

        renderUnitsGrid(filtered);
    }

    function renderUnitsGrid(unitsArray) {
        const container = document.getElementById('adminUnitsContainer');
        if(unitsArray.length === 0) {
            container.innerHTML = `<div class="text-muted text-center py-5 w-100">لا توجد شاليهات مسجلة تطابق بيانات البحث حالياً.</div>`;
            return;
        }

        container.innerHTML = "";
        unitsArray.forEach(u => {
            const fallbackImg = "https://images.unsplash.com/photo-1540555700478-4be289fbecef?w=500";
            const currentPrice = u.price ? parseFloat(u.price).toLocaleString() : "0";

            container.innerHTML += `
                <div class="unit-admin-card position-relative">
                    <span class="unit-badge-class"><i class="fas fa-crown ms-1"></i> ${u.chaletClass || 'Standard'}</span>
                    <img src="${u.mainImage || fallbackImg}" class="unit-card-img" alt="${u.chaletName}">
                    
                    <div class="p-3">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h6 class="fw-black text-white m-0 text-truncate" style="max-width: 70%;">${u.chaletName || 'بدون اسم ترويجي'}</h6>
                            <span class="badge bg-primary rounded-3 text-white fw-black px-2 py-1" style="font-size:0.75rem;">${u.rentCode || 'N/A'}</span>
                        </div>
                        
                        <div class="small text-muted mb-1"><i class="fas fa-map-marker-alt ms-1 text-secondary"></i> ${u.village} - مج ${u.group || '1'}</div>
                        <div class="small text-muted mb-3"><i class="fas fa-user-tie ms-1 text-secondary"></i> المالك: <span class="text-white-50">${u.ownerName || '---'}</span></div>
                        
                        <!-- صندوق عرض السعر وتحديثه السريع -->
                        <div class="d-flex justify-content-between align-items-center p-2 rounded-3 mb-3" style="background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.05);">
                            <div>
                                <span class="text-muted d-block" style="font-size: 0.7rem;">سعر الليلة الحالي</span>
                                <b class="text-warning" style="font-size:1.05rem;">${currentPrice} ج.م</b>
                            </div>
                            <button class="btn btn-sm btn-link text-primary fw-bold text-decoration-none p-0" onclick="openPriceModal('${u.id}', '${u.chaletName}', '${u.rentCode}', '${u.price || 0}')">
                                <i class="fas fa-pen-to-square me-1"></i> تغيير السعر
                            </button>
                        </div>

                        <!-- أزرار الإدارة والتوجيه -->
                        <div class="row g-2">
                            <div class="col-6">
                                <a href="manage_units.html?editId=${u.id}" class="btn btn-sm btn-outline-light w-100 py-2 rounded-3 fw-bold">
                                    <i class="fas fa-edit me-1"></i> تعديل شامل
                                </a>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-sm btn-outline-danger w-100 py-2 rounded-3 fw-bold" onclick="deleteUnit('${u.id}', '${u.chaletName}')">
                                    <i class="fas fa-trash-alt me-1"></i> حذف الأصل
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // ربط محرك البحث الفوري
    document.getElementById('assetSearchInput').addEventListener('input', applyFilter);

    // دالة فتح مودال تغيير السعر وضخ البيانات فيه
    window.openPriceModal = (id, title, code, currentPrice) => {
        document.getElementById('modalTargetUnitId').value = id;
        document.getElementById('modalChaletTitle').innerText = title;
        document.getElementById('modalChaletCode').innerText = code;
        document.getElementById('modalNewPriceInput').value = currentPrice;
        bootstrapPriceModal.show();
    };

    // دالة حفظ السعر الجديد وتحديثه في فايربيز فوراً
    window.saveNewPrice = async () => {
        const id = document.getElementById('modalTargetUnitId').value;
        const newPrice = document.getElementById('modalNewPriceInput').value;

        if(!newPrice || parseFloat(newPrice) <= 0) {
            alert("برجاء إدخال سعر صحيح أكبر من الصفر.");
            return;
        }

        try {
            const unitRef = doc(db, "units", id);
            await updateDoc(unitRef, { price: newPrice });
            bootstrapPriceModal.hide();
            // الـ onSnapshot هيحدث الشاشة تلقائياً
        } catch (error) {
            alert("❌ فشل تحديث السعر: " + error.message);
        }
    };

    // دالة حذف أصل عقاري بالكامل من السيستم
    window.deleteUnit = async (id, title) => {
        if(!confirm(`⚠️ تحذير نهائي: هل أنت متأكد من رغبتك في حذف شاليه (${title}) نهائياً من السيستم؟ هذا الإجراء لا يمكن التراجع عنه!`)) return;
        
        try {
            await deleteDoc(doc(db, "units", id));
            alert("🗑️ تم حذف الأصل العقاري من النظام بنجاح.");
        } catch (error) {
            alert("❌ فشل الحذف: " + error.message);
        }
    };

    listenToUnits();
</script>

<!-- استدعاء ملفات جافاسكريبت الخاصة ببوتستراب لتشغيل المودال -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
