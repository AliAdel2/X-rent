<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصروفات النثرية العامة للشركة | Masar PRO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #004aad; 
            --gold: #c5a059; 
            --bg-light: #f4f6f9;
            --card-bg: #ffffff;
            --text-dark: #2d3436;
        }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-light); color: var(--text-dark); padding: 20px 0; }
        .lux-card { background: var(--card-bg); border-radius: 25px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.04); padding: 25px; }
        .lux-input { background: #ffffff; border: 1px solid #e1e2e6; border-radius: 15px; padding: 12px 20px; color: var(--text-dark); font-weight: 700; }
        .lux-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 74, 173, 0.1); outline: none; }
        .btn-submit { background: linear-gradient(135deg, #7f8c8d, #34495e); color: white; border: none; border-radius: 15px; font-weight: 800; padding: 12px; transition: all 0.3s; }
        .btn-submit:hover { background: #2c3e50; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); color: white; }
        .expense-table { border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .expense-table th { background: #34495e; color: white; text-align: center; font-size: 0.85rem; }
        .expense-table td { text-align: center; vertical-align: middle; font-size: 0.85rem; font-weight: 700; }
        th { background-color:#0069d9; color:white; text-align:center; vertical-align:middle; white-space:nowrap; }
        td { text-align:center; vertical-align:middle; white-space:nowrap; }
    </style>
</head>
<body>

<div class="container">
    <!-- الهيدر -->
    <div class="d-flex justify-content-between align-items-center mb-4 px-1">
        <div>
            <h4 class="fw-black text-dark m-0"><i class="fas fa-soap text-secondary me-1"></i> المصروفات النثرية العامة للشركة</h4>
            <!-- ⚡ ربط اسم المستخدم الحالي لوصف الصفحة ديناميكياً -->
            <p class="text-muted small m-0 mt-1" id="supervisorGeneralDesc">تسجيل مشتريات المنظفات، الأدوات، ومصاريف مكتب إدارة الشركة المتنوعة</p>
        </div>
        <a href="supervisor_dashboard.html" class="btn btn-sm btn-outline-secondary fw-bold rounded-pill px-3"><i class="fas fa-arrow-right me-1"></i> اللوحة الرئيسية</a>
    </div>

    <div class="row g-4">
        <!-- فورمة إدخال المصروف العام -->
        <div class="col-lg-5">
            <div class="lux-card">
                <h5 class="fw-bold text-secondary mb-4"><i class="fas fa-calculator me-1"></i> قيد مصروف إداري جديد</h5>
                <form id="generalExpenseForm">
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">تصنيف المصروف العام:</label>
                        <select id="expenseCategory" class="form-select lux-input" required>
                            <option value="منظفات وأدوات نظافة">منظفات وأدوات نظافة (صابون، كلور، إلخ) 🧼</option>
                            <option value="أدوات مكتبية ومطبوعات">أدوات مكتبية، أوراق ومطبوعات 📝</option>
                            <option value="بوفيه وضيافة">بوفيه، شاي، ضيافة ومياه معبأة ☕</option>
                            <option value="صيانة مقر الإدارة">صيانة وتجهيزات مقر الشركة الإداري 🛠️</option>
                            <option value="انتقالات ومواصلات">انتقالات، كروت شحن اتصالات ومواصلات 🚗</option>
                            <option value="أخرى">مصاريف عامة أخرى</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">المبلغ المدفوع (ج.م):</label>
                        <input type="number" id="expenseAmount" class="form-control lux-input" placeholder="أدخل المبلغ الفعلي" required min="1">
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">تفاصيل وبيان المشتريات / المصروف:</label>
                        <textarea id="expenseDetails" class="form-control lux-input" rows="4" placeholder="مثال: شراء كرتونة مسحوق غسيل + 5 زجاجات مطهر لتجهيز الشاليهات" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-submit w-100" id="btnSubmit">
                        <i class="fas fa-save me-1"></i> حفظ وتسجيل المصروف العام
                    </button>
                </form>
            </div>
        </div>

        <!-- جدول المصروفات العامة لليوم -->
        <div class="col-lg-7">
            <div class="lux-card">
                <h5 class="fw-bold text-dark mb-4"><i class="fas fa-history text-gold me-1"></i> النثريات والمصروفات العامة المسجلة اليوم</h5>
                <div class="table-responsive">
                    <table class="table table-hover expense-table border">
                        <thead>
                            <tr>
                                <th>التصنيف</th>
                                <th>المبلغ</th>
                                <th>البيان والوصف التفصيلي</th>
                                <th>المشرف المسؤول</th>
                            </tr>
                        </thead>
                        <tbody id="generalExpensesTableBody">
                            <tr>
                                <td colspan="4" class="py-4 text-muted">جاري تحميل حركات المصاريف العامة...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
        authDomain: "masar-8dbce.firebaseapp.com",
        projectId: "masar-8dbce",
        storageBucket: "masar-8dbce.firebasestorage.app",
        messagingSenderId: "201867140566",
        appId: "1:201867140566:web:b21dd8f049276007ed1877"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ⚡ التحديث الجوهري: استرداد اسم ورتبة المسئول ديناميكياً من المتصفح
    const currentSystemUser = localStorage.getItem('userName') || "مشرف ميداني";
    const currentUserRole = localStorage.getItem('userRole');

    // 🛡️ آلية التحقق الأمني من الجلسة المفتوحة وصلاحيتها
    function checkAuthProtection() {
        if (!localStorage.getItem('userName') || (currentUserRole !== 'مشرف' && currentUserRole !== 'ادارة')) {
            alert("⚠️ خطأ أمني: وصول غير مصرح به! يرجى تسجيل الدخول أولاً بحساب مشرف.");
            window.location.href = "index.html";
            return false;
        }
        // طباعة بيان المشرف الحالي في الهيدر العلوي
        document.getElementById('supervisorGeneralDesc').innerHTML = `المسؤول الحالي: <span class="fw-bold text-secondary">${currentSystemUser}</span> | تسجيل ومتابعة نثريات ومشتريات مكتب الإدارة`;
        return true;
    }

    // 1. تحميل مصروفات الشركة العامة الخاصة باليوم الحالي فقط
    async function loadTodayGeneralExpenses() {
        const tbody = document.getElementById('generalExpensesTableBody');
        const todayStr = new Date().toISOString().split('T')[0];
        try {
            const snap = await getDocs(collection(db, "general_expenses"));
            let rowsHTML = "";
            let count = 0;

            snap.forEach(doc => {
                const data = doc.data();
                const logDate = data.timestamp ? data.timestamp.split('T')[0] : "";
                
                if (logDate === todayStr) {
                    count++;
                    rowsHTML += `
                        <tr>
                            <td><span class="badge bg-light text-secondary border fw-bold">${data.category}</span></td>
                            <td class="text-danger fw-black">${data.amount} ج.م</td>
                            <td class="text-muted text-end small" style="max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${data.details}">${data.details}</td>
                            <td><span class="text-secondary small">${data.supervisor}</span></td>
                        </tr>`;
                }
            });

            if (count === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-4 text-muted">لم يتم تسجيل أي مصاريف عامة للشركة اليوم حتى الآن.</td></tr>`;
            } else {
                tbody.innerHTML = rowsHTML;
            }
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-danger py-4">خطأ أثناء جلب المصروفات العامة: ${error.message}</td></tr>`;
        }
    }

    // 2. حفظ المصروف العام الجديد
    document.getElementById('generalExpenseForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');

        const payload = {
            category: document.getElementById('expenseCategory').value,
            amount: parseFloat(document.getElementById('expenseAmount').value) || 0,
            details: document.getElementById('generalExpenseForm').elements['expenseDetails'].value.trim(),
            supervisor: currentSystemUser, // ⚡ ترحيل الحركة بالاسم الديناميكي للمشرف المسجل
            timestamp: new Date().toISOString()
        };

        try {
            btn.disabled = true;
            btn.innerText = "جاري ترحيل وحفظ القيد العام...";
            
            await addDoc(collection(db, "general_expenses"), payload);
            
            alert(`🎉 تم حفظ وتوثيق المصروف العام بنجاح بقيمة ${payload.amount} ج.م`);
            document.getElementById('generalExpenseForm').reset();
            loadTodayGeneralExpenses();
        } catch (error) {
            alert("فشل حفظ المصروف العام: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "حفظ وتسجيل المصروف العام";
        }
    });

    window.onload = () => {
        if (checkAuthProtection()) {
            loadTodayGeneralExpenses();
        }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
