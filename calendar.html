<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الإشغال العام | Masar PRO</title>
    <!-- Bootstrap RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts (Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
         <link rel="manifest" href="manifest.json">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- جعل الصفحة متوافقة تماماً مع أبعاد شاشات الموبايل ومنع الزوم المزعج -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- كود سحري لآبل (آيفون) لتشغيل الموقع كتطبيق بكامل الشاشة وإخفاء شريط المتصفح -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" style="black-translucent">
<meta name="apple-mobile-web-app-title" content="Masar PRO">

<!-- كود الأندرويد ومتصفح كروم للتشغيل بكامل الشاشة -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#004aad"> <!-- لون شريط الحالة العلوي ليطابق هويتك -->

    <style>
        :root { 
            --bg-light: #f4f7fc;
            --card-white: #ffffff;
            --glass-border: rgba(0, 74, 173, 0.06);
            --text-main: #1e293b;
            --text-muted: #64748b;
            
            --primary: #004aad;
            --primary-light: #edf4fe;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --gold: #c5a059;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg-light);
            color: var(--text-main); 
            padding-bottom: 60px;
            min-height: 100vh;
        }

        /* رأس الصفحة */
        .page-header {
            background: var(--card-white);
            border: 1px solid var(--glass-border);
            padding: 14px 18px; 
            border-radius: 16px;
            margin-top: 15px; 
            box-shadow: 0 8px 20px rgba(0, 74, 173, 0.02);
        }

        .btn-back {
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            background: #ffffff;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.25s ease;
        }

        /* شريط التصفية والتحكم في الأيام */
        .timeline-control {
            background: var(--card-white);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px;
            margin-top: 12px;
        }

        /* كارت الوحدة بجدول الإشغال - النمط الملموم جداً */
        .occupancy-row {
            background: var(--card-white);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 10px 14px;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0, 74, 173, 0.01);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .unit-info-block {
            min-width: 90px;
        }

        .unit-name-title {
            font-size: 0.95rem;
            font-weight: 900;
            color: var(--primary);
            margin: 0;
        }

        /* شريط الأيام الذكي للموبايل */
        .days-track {
            display: flex;
            gap: 4px;
            flex-grow: 1;
            justify-content: flex-end;
            overflow-x: auto;
            padding-bottom: 2px;
        }

        /* خلية اليوم الصغير */
        .day-cell {
            min-width: 34px;
            height: 38px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        
        /* دلالات الألوان للإشغال الحقيقي */
        .cell-free {
            background-color: #e8fbf0;
            color: var(--success);
            border: 1px solid rgba(46, 204, 113, 0.15);
        }
        .cell-busy {
            background-color: #fdf2f2;
            color: var(--danger);
            border: 1px solid rgba(231, 76, 60, 0.15);
        }
        .cell-checkout {
            background-color: #fef9ec;
            color: var(--warning);
            border: 1px solid rgba(243, 156, 18, 0.2);
        }

        /* دليل الألوان السفلي السريع */
        .legend-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 15px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .legend-item i { margin-left: 4px; }
    </style>
</head>
<body>

<div class="container">
    <!-- رأس الصفحة -->
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <h6 class="fw-black m-0" style="color: var(--primary); font-size: 1.05rem;"><i class="fas fa-calendar-alt me-1"></i> جدول الإشغال العام للوحدات</h6>
            <p class="text-muted small mb-0" style="font-size: 0.75rem;">رؤية حية لتوفر الشاليهات على مدار الـ 5 أيام القادمة</p>
        </div>
        <a href="marketer_dashboard.html" class="btn btn-back btn-sm px-2 py-1" style="font-size: 0.8rem;">
            <i class="fas fa-arrow-right me-1"></i> الرئيسية
        </a>
    </div>

    <!-- التحكم في تصفية القرية أو البحث السريع -->
    <div class="timeline-control">
        <div class="row g-2">
            <div class="col-12">
                <select class="form-select form-select-sm fw-bold text-muted" id="villageFilter" onchange="loadOccupancyGrid()" style="border-radius: 8px; font-size: 0.8rem;">
                    <option value="all">كل القرى والمنتجعات</option>
                    <option value="فارما بيتش ريزورت">فارما بيتش ريزورت </option>
                    <option value="مارينا دلتا">مارينا دلتا </option>
                    <option value="مارينا لاجونز">مارينا لاجونز </option>
                </select>
            </div>
        </div>
        
        <!-- دليل الألوان التوضيحي -->
        <div class="legend-container">
            <span class="legend-item text-success"><i class="fas fa-square"></i> متاح</span>
            <span class="legend-item text-danger"><i class="fas fa-square"></i> محجوز كامل</span>
            <span class="legend-item text-warning"><i class="fas fa-square"></i> خروج اليوم</span>
        </div>
    </div>

    <!-- قائمة الشاليهات والجدول الزمني المدمج -->
    <div class="mt-3" id="occupancyGridContainer">
        <!-- سيتم توليد الأسطر ديناميكياً هنا عبر الجافاسكريبت -->
        <div class="text-center py-5 text-muted">
            <i class="fas fa-spinner fa-spin fa-2x mb-2 text-primary"></i>
            <p class="fw-bold small">جاري إعداد شريط تتبع الإشغال الفوري...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCDMDK7RFxB-s9BuqszNgfst5Gr-kLTi8c",
        authDomain: "masar-8dbce.firebaseapp.com",
        projectId: "masar-8dbce",
        storageBucket: "masar-8dbce.firebasestorage.app",
        messagingSenderId: "201867140566",
        appId: "1:201867140566:web:b21dd8f049276007ed1877"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let localUnits = [];

    // توليد مصفوفة لـ 5 أيام قادمة من تاريخ اليوم ليعرضها النظام في التراك بتوقيت سليم
    function getNext5Days() {
        const days = [];
        const dayNames = ['أحد', 'إثنين', 'ثلاثاء', 'أربعاء', 'خميس', 'جمعة', 'سبت'];
        
        for (let i = 0; i < 5; i++) {
            const d = new Date();
            d.setDate(d.getDate() + i);
            
            // تهيئة التاريخ لوكال بدون فروق التوقيت
            const offset = d.getTimezoneOffset();
            const localDate = new Date(d.getTime() - (offset * 60 * 1000));
            const dateStr = localDate.toISOString().split('T')[0];

            days.push({
                dayNum: d.getDate(),
                dayName: dayNames[d.getDay()],
                dateStr: dateStr
            });
        }
        return days;
    }

    const next5DaysList = getNext5Days();

    // دالة تحليل فترات النصوص المستخرجة من bookedDates بنفس منطق صفحة التفاصيل
    function parseRanges(bookedDates) {
        let parsed = [];
        if (!Array.isArray(bookedDates)) return parsed;
        
        bookedDates.forEach(range => {
            let startStr = ""; let endStr = "";
            if (typeof range === 'string') {
                const parts = range.split(/ to | - | إلى /);
                if (parts.length === 2) { startStr = parts[0].trim(); endStr = parts[1].trim(); }
            } else if (range.start && range.end) {
                startStr = range.start; endStr = range.end;
            }
            if (startStr && endStr) parsed.push({ start: startStr, end: endStr });
        });
        return parsed;
    }

    // استماع لقاعدة البيانات
    onSnapshot(collection(db, "units"), (snapshot) => {
        localUnits = [];
        snapshot.forEach((doc) => {
            localUnits.push({ id: doc.id, ...doc.data() });
        });
        localUnits.sort((a, b) => (a.rentCode || '').localeCompare(b.rentCode || ''));
        loadOccupancyGrid();
    });

    window.loadOccupancyGrid = () => {
        const container = document.getElementById('occupancyGridContainer');
        container.innerHTML = "";
        
        const selectedVillage = document.getElementById('villageFilter').value;

        const filtered = localUnits.filter(u => {
            if (selectedVillage !== 'all' && u.village !== selectedVillage) return false;
            return true;
        });

        if (filtered.length === 0) {
            container.innerHTML = `<p class="text-center text-muted small fw-bold py-4">لا توجد وحدات مسجلة لهذه التصفية.</p>`;
            return;
        }

        filtered.forEach(u => {
            const rowDiv = document.createElement('div');
            rowDiv.className = "occupancy-row";

            // بلوك بيانات الشاليه اليساري (ملموم)
            let unitHeaderHTML = `
                <div class="unit-info-block">
                    <h6 class="unit-name-title">${u.chaletName || u.rentCode || 'N/A'}</h6>
                    <small class="text-muted" style="font-size:0.65rem;"><i class="fas fa-campground text-warning"></i> ${u.village || 'ريزورت'}</small>
                </div>
            `;

            // تفكيك فترات الحجز الخاصة بالوحدة الحالية لتحديد الأيام الفردية المحجوزة
            const ranges = parseRanges(u.bookedDates || []);
            let allBookedDays = [];
            
            ranges.forEach(r => {
                let current = new Date(r.start);
                let endObj = new Date(r.end);
                while (current < endObj) {
                    const y = current.getFullYear();
                    const m = String(current.getMonth() + 1).padStart(2, '0');
                    const d = String(current.getDate()).padStart(2, '0');
                    allBookedDays.push(`${y}-${m}-${d}`);
                    
                    current.setDate(current.getDate() + 1);
                }
            });

            // بناء تراك الأيام الـ 5 لليمين
            let daysTrackHTML = `<div class="days-track">`;
            
            next5DaysList.forEach((day, index) => {
                // الفحص الدقيق والمطابق لـ حقل bookedDates الخاص بالوحدة
                const isDayReserved = allBookedDays.includes(day.dateStr);
                
                let cellClass = "cell-free";

                if (isDayReserved) {
                    cellClass = "cell-busy"; // لون أحمر محجوز كامل
                }

                daysTrackHTML += `
                    <div class="day-cell ${cellClass}">
                        <span>${day.dayName}</span>
                        <span class="fw-black" style="font-size:0.8rem;">${day.dayNum}</span>
                    </div>
                `;
            });
            
            daysTrackHTML += `</div>`;

            // دمج الصف بالكامل
            rowDiv.innerHTML = unitHeaderHTML + daysTrackHTML;
            container.appendChild(rowDiv);
        });
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // أول ما المستخدم يلمس الشاشة في أي مكان، يتم تفعيل وضع التطبيق الكامل
    document.addEventListener("click", function() {
        var doc = window.document;
        var docEl = doc.documentElement;

        var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        var cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

        if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
            requestFullScreen.call(docEl);
        }
    });
</script>

</body>
</html>
